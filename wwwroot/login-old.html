<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-900 flex items-center justify-center h-screen">

    <div class="bg-slate-800 p-8 rounded-2xl w-[400px] shadow-2xl">

        <h1 class="text-3xl text-white font-bold mb-6">
            Login
        </h1>

        <div class="space-y-4">

            <input id="email"
                   type="email"
                   placeholder="Email"
                   class="w-full p-3 rounded-lg bg-slate-700 text-white">

            <input id="password"
                   type="password"
                   placeholder="Password"
                   class="w-full p-3 rounded-lg bg-slate-700 text-white">

            <button onclick="login()"
                    class="w-full bg-blue-600 hover:bg-blue-700 p-3 rounded-lg text-white font-semibold">

                Login

            </button>

        </div>

    </div>

    <script>

        async function login() {

            const email =
                document.getElementById("email").value;

            const password =
                document.getElementById("password").value;

            const res = await fetch(
                "https://localhost:7222/api/auth/login",
                {
                    method: "POST",

                    headers: {
                        "Content-Type": "application/json"
                    },

                    body: JSON.stringify({
                        email,
                        password
                    })
                }
            );

            if (!res.ok) {

                alert("Invalid login");

                return;
            }

            const user = await res.json();

            // SAVE USER
            localStorage.setItem(
                "user",
                JSON.stringify(user)
            );

            // GO TO BOARD
            window.location.href = "index2.html";
        }

    </script>

</body>
</html>
