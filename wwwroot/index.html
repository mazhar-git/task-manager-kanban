<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Kanban Board</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">

    <h1 class="text-2xl font-bold mb-6">Task Manager</h1>
    <div class="mb-6">
        <button onclick="openModal()"
                class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
            + Add Task
        </button>
    </div>
    <div class="grid grid-cols-3 gap-4">

        <!-- TODO -->
        <div class="bg-white p-4 rounded shadow">
            <h2 class="font-bold mb-4">To Do</h2>
            <div id="todo" class="min-h-[300px]" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
        </div>

        <!-- IN PROGRESS -->
        <div class="bg-white p-4 rounded shadow">
            <h2 class="font-bold mb-4">In Progress</h2>
            <div id="inprogress" class="min-h-[300px]" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
        </div>

        <!-- DONE -->
        <div class="bg-white p-4 rounded shadow">
            <h2 class="font-bold mb-4">Done</h2>
            <div id="done" class="min-h-[300px]" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
        </div>

    </div>
    <!-- Modal -->
    <div id="taskModal"
         class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center">

        <div class="bg-white p-6 rounded-lg shadow-lg w-[400px]">

            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold">Create Task</h2>

                <button onclick="closeModal()" class="text-gray-500 text-xl">
                    ×
                </button>
            </div>

            <div class="space-y-3">

                <input id="title"
                       type="text"
                       placeholder="Task Title"
                       class="w-full border p-2 rounded" />

                <textarea id="description"
                          placeholder="Description"
                          class="w-full border p-2 rounded"></textarea>

                <select id="priority"
                        class="w-full border p-2 rounded">
                    <option value="Low">Low</option>
                    <option value="Medium">Medium</option>
                    <option value="High">High</option>
                </select>

                <select id="status"
                        class="w-full border p-2 rounded">
                    <option value="Todo">Todo</option>
                    <option value="InProgress">In Progress</option>
                    <option value="Done">Done</option>
                </select>

                <select id="assignedTo"
                        class="w-full border p-2 rounded">

                    <option value="">Select Developer</option>

                </select>

                <input id="estimatedHours"
                       type="number"
                       placeholder="Estimated Hours"
                       class="w-full border p-2 rounded" />

                <input id="dueDate"
                       type="date"
                       class="w-full border p-2 rounded" />

                <button onclick="createTask()"
                        class="w-full bg-green-600 text-white py-2 rounded hover:bg-green-700">
                    Create Task
                </button>

            </div>
        </div>
    </div>
    <script>
        const API_URL = "https://localhost:7222/api/tasks"; // change port if needed
        const USERS_API = "https://localhost:7222/api/users";

        let tasks = [];

        // Fetch tasks
        async function loadTasks() {
            try {
                const res = await fetch(API_URL);

                if (!res.ok) {
                    const text = await res.text();
                    console.error("API Error:", text);
                    return;
                }

                tasks = await res.json();
                renderTasks();
            } catch (err) {
                console.error("Fetch failed:", err);
            }
        }

        // Load Users
        async function loadUsers() {

            try {

                const res = await fetch(USERS_API);

                if (!res.ok) {
                    console.error(await res.text());
                    return;
                }

                const users = await res.json();

                const dropdown = document.getElementById("assignedTo");

                dropdown.innerHTML =
                    `<option value="">Select Developer</option>`;

                users.forEach(user => {

                    dropdown.innerHTML += `
                        <option value="${user.id}">
                            ${user.name}
                        </option>
                    `;
                });

            } catch (err) {
                console.error(err);
            }
        }

        // Render tasks
        function renderTasks() {
            document.getElementById("todo").innerHTML = "";
            document.getElementById("inprogress").innerHTML = "";
            document.getElementById("done").innerHTML = "";

            tasks.forEach(task => {
                const el = document.createElement("div");
                el.className = "p-3 mb-2 bg-gray-200 rounded cursor-move";
                el.draggable = true;
                el.id = "task-" + task.id;
                el.ondragstart = drag;

                el.innerHTML = `
                                          <div class="font-semibold">${task.title}</div>
                                          <div class="text-sm text-gray-600">
                                                 Priority: ${task.priority}
                                          </div>
                                          <div class="text-sm text-blue-600">
                                            Assigned To: ${task.assignedTo ?? "Unassigned"}
                                        </div>`;

                if (task.status === "Todo")
                    document.getElementById("todo").appendChild(el);
                else if (task.status === "InProgress")
                    document.getElementById("inprogress").appendChild(el);
                else
                    document.getElementById("done").appendChild(el);
            });
        }

        // Drag functions
        function allowDrop(ev) {
            ev.preventDefault();
        }

        function drag(ev) {
            ev.dataTransfer.setData("text", ev.target.id);
        }

        async function drop(ev) {
            ev.preventDefault();
            const data = ev.dataTransfer.getData("text");
            const taskId = data.split("-")[1];
            const newStatus = ev.target.id;

            // Update UI immediately
            ev.target.appendChild(document.getElementById(data));

            // Map column to backend value
            let statusValue = "Todo";
            if (newStatus === "inprogress") statusValue = "InProgress";
            if (newStatus === "done") statusValue = "Done";

            // Find task
            const task = tasks.find(t => t.id == taskId);
            task.status = statusValue;

            // Update API
            await fetch(`${API_URL}/${taskId}`, {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(task)
            });
        }

        // Open modal
        function openModal() {
            document.getElementById("taskModal")
                .classList.remove("hidden");

            document.getElementById("taskModal")
                .classList.add("flex");
        }

        // Close modal
        function closeModal() {
            document.getElementById("taskModal")
                .classList.add("hidden");

            document.getElementById("taskModal")
                .classList.remove("flex");
        }

        // Create task
        async function createTask() {

            const task = {
                title: document.getElementById("title").value,
                description: document.getElementById("description").value,
                priority: document.getElementById("priority").value,
                status: document.getElementById("status").value,
                assignedTo: document.getElementById("assignedTo").value
                    ? parseInt(document.getElementById("assignedTo").value)
                    : null,
                estimatedHours: parseInt(document.getElementById("estimatedHours").value) || 0,
                dueDate: document.getElementById("dueDate").value
            };

            const res = await fetch(API_URL, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(task)
            });

            if (!res.ok) {
                console.error(await res.text());
                alert("Failed to create task");
                return;
            }

            closeModal();

            // Reload tasks
            await loadTasks();

            // Clear form
            document.getElementById("title").value = "";
            document.getElementById("description").value = "";
            document.getElementById("assignedTo").value = "";
            document.getElementById("estimatedHours").value = "";
        }


        // Initial load
        loadTasks();
        loadUsers();
    </script>

</body>
</html>
